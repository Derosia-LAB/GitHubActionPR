# GitHubAction
name: Python Linting

on: 
  - workflow_dispatch

jobs:
  security-events: read
  lintingOperation: #name of job
    permissions:
      security-events: read
    runs-on: ubuntu latest #snowglobe to uses
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      
      - uses: advanced-security/python-lint-code-scanning-action@v1
        with:
          linter: flake8
